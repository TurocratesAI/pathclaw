name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Lightweight CI — lint + syntax check only. The full install (torch,
# cellpose, timm, openslide, mammoth-moe, peft, etc.) is ~3 GB and takes
# 5-10 min on a fresh runner; it's not the right fit for a public-repo
# gate. Users run the real smoke tests locally during setup (see README
# "First experiment in 5 minutes").
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check pathclaw

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all Python modules
        working-directory: backend
        run: python -m compileall -q pathclaw
